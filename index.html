<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Linear Algebra Lab — a beginner-friendly, interactive course connecting linear algebra to modern machine learning."
    />
    <title>Linear Algebra Lab</title>
    <script>
      // Apply saved appearance settings before first paint to avoid a flash.
      (function () {
        try {
          var el = document.documentElement;
          var pref = localStorage.getItem("la-lab-theme") || "system";
          var resolved =
            pref === "light" || pref === "dark"
              ? pref
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          el.setAttribute("data-theme", resolved);

          var width = localStorage.getItem("la-lab-width");
          if (width === "wide" || width === "full") el.dataset.width = width;

          var textSize = localStorage.getItem("la-lab-text-size");
          if (textSize === "small" || textSize === "large")
            el.dataset.textSize = textSize;

          var lang = localStorage.getItem("la-lab-lang");
          if (lang === "zh") el.lang = "zh-Hant";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
